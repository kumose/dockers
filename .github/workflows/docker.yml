name: Build Docker Images

on:
  push:
    branches: [master]
    paths:
      - '**/Dockerfile'
      - '**/VERSION'
      - 'scripts/build.sh'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [master]
    paths:
      - '**/Dockerfile'
      - '**/VERSION'
      - 'scripts/build.sh'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      name:
        description: System to build
        type: choice
        options:
          - auto
          - ubuntu20
          - ubuntu22
          - ubuntu24
          - debian11
          - debian12
          - alpine319
          - alpine320
          - centos7
          - centos8
          - centos9
        default: auto
      push:
        description: Push to GHCR
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-matrix
        run: |
          ALL_NAMES="ubuntu20 ubuntu22 ubuntu24 debian11 debian12 alpine319 alpine320 centos7 centos8 centos9"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            NAME="${{ inputs.name }}"
            if [[ "$NAME" == "auto" ]]; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '/(Dockerfile|VERSION)$' | sed 's|/.*||' | sort -u || true)
            else
              CHANGED="$NAME"
            fi
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            CHANGED="$ALL_NAMES"
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '/(Dockerfile|VERSION)$' | sed 's|/.*||' | sort -u)
          fi

          if [[ -z "$CHANGED" ]]; then
            echo "matrix={\"name\":[]}" >> $GITHUB_OUTPUT
          else
            JSON="["
            FIRST=true
            for n in $CHANGED; do
              if [ "$FIRST" = true ]; then FIRST=false; else JSON+=","; fi
              JSON+="\"$n\""
            done
            JSON+="]"
            echo "matrix={\"name\":$JSON}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '{"name":[]}'
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.detect.outputs.matrix).name }}
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read version
        id: version
        run: echo "v=$(cat ${{ matrix.name }}/VERSION | tr -d ' \t\n')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' && inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name == 'workflow_dispatch' && inputs.push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.name }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          tags: |
            ${{ env.REGISTRY }}/kumo-${{ matrix.name }}-${{ matrix.arch }}:${{ steps.version.outputs.v }}
            ${{ env.REGISTRY }}/kumo-${{ matrix.name }}-${{ matrix.arch }}:latest
          push: true

      - name: Smoke test
        if: github.event_name == 'workflow_dispatch' && inputs.push
        run: |
          docker pull --platform "linux/${{ matrix.arch }}" \
            "${{ env.REGISTRY }}/kumo-${{ matrix.name }}-${{ matrix.arch }}:${{ steps.version.outputs.v }}"
          docker run --rm --platform "linux/${{ matrix.arch }}" \
            "${{ env.REGISTRY }}/kumo-${{ matrix.name }}-${{ matrix.arch }}:${{ steps.version.outputs.v }}" sh -c '
            echo "=== cmake ===" && cmake --version
            echo "=== ninja ===" && ninja --version
            echo "=== gcc ===" && gcc --version 2>&1 | head -1
            echo "=== python3 ===" && python3 --version
            echo "=== git ===" && git --version
            echo "=== curl ===" && curl --version | head -1
            echo "=== make ===" && make --version | head -1
            echo "=== autoconf ===" && autoconf --version | head -1
            echo "=== pkg-config ===" && pkg-config --version
            echo "All tools verified OK"
          '

      - name: Build (verify)
        if: github.event_name != 'workflow_dispatch' || !inputs.push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.name }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
